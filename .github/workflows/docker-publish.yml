name: Publish Docker image

on:
  push:
    # Release tags are bare semver, e.g. 0.4.32
    tags: [ '[0-9]+.[0-9]+.[0-9]+' ]
  workflow_dispatch:
    inputs:
      ffsubsync_version:
        description: 'PyPI version to build (leave blank to build from the checked-out tree)'
        required: false
        default: ''
      push_image:
        description: 'Push the built image to ghcr (off = build-only test)'
        type: boolean
        required: false
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # versioneer needs full history/tags to compute the version
        fetch-depth: 0

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=tag

    - name: Build and push
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        # Build-only on manual runs unless push_image is explicitly enabled;
        # always push on tag releases.
        push: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.push_image == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          FFSUBSYNC_VERSION=${{ github.event.inputs.ffsubsync_version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
